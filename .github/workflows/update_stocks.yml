name: 株価データ自動更新

on:
  schedule:
    # 1回目: 平日06:30 UTC = 15:30 JST（日本市場終値直後）
    - cron: '30 6 * * 1-5'
    # 2回目: 平日21:30 UTC = 06:30 JST翌朝（米国株終値取得 ※米国市場20:00UTC閉場後）
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install yfinance

      - name: 株価データを更新
        run: python .github/workflows/update_data.py

      - name: data.json をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "自動更新: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') [GitHub Actions]"
          git push
