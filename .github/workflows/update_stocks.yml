name: 株価データ自動更新

on:
  schedule:
    # 平日13:00 UTC = 22:00 JST（月〜金）
    - cron: '0 13 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install yfinance

      - name: 株価データを更新
        run: python .github/workflows/update_data.py

      - name: data.json をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "自動更新: $(date '+%Y-%m-%d %H:%M' -d '+9 hours') [GitHub Actions]"
          git push
